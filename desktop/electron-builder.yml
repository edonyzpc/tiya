appId: io.tiya.desktop
productName: tiya
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
directories:
  buildResources: assets
  output: release
# Do not force a single host-arch Electron dist here. macOS universal builds
# need electron-builder to resolve per-arch Electron archives for x64 + arm64.
files:
  - dist-renderer/**
  - dist-electron/**
  - package.json
  # Keep host-specific build tool binaries out of the packaged app. They are
  # only needed during bundling, but direct optional deps make them visible to
  # electron-builder's production-dependency scan.
  - "!node_modules/@esbuild/**"
  - "!node_modules/@rollup/**"
extraResources:
  - from: ../dist/desktop-sidecars/tiya-supervisor
    to: tiya-backend/tiya-supervisor
  - from: ../dist/desktop-sidecars/tiya-worker
    to: tiya-backend/tiya-worker
asar: true
linux:
  category: Utility
  description: Desktop GUI for configuring and managing the tiya runtime.
  executableName: tiya-desktop
  icon: icons
  desktop:
    entry:
      StartupWMClass: tiya
  target:
    - target: dir
    - target: zip
    - target: deb
    - target: rpm
deb:
  compression: gz
  packageCategory: utility
  maintainer: tiya contributors
  synopsis: tiya desktop control console
rpm:
  compression: null
  packageCategory: Applications/Utilities
  maintainer: tiya contributors
  fpm:
    - --rpm-compression
    - gzip
mac:
  category: public.app-category.developer-tools
  icon: icon.icns
  # @electron/universal uses minimatch without dot=true, so hidden directories
  # like the PyInstaller PIL/.dylibs tree must be allowed explicitly.
  x64ArchFiles: "{Contents/{Frameworks,MacOS,Resources/tiya-backend}/**/*,Contents/Resources/tiya-backend/**/.dylibs/**/*}"
  target:
    - target: zip
      arch: universal
    - target: dmg
      arch: universal
dmg:
  sign: false
