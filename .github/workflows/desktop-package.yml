      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json
      - name: Sync Python dependencies
        run: uv sync --group dev
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --include=optional
      - name: Apply beta desktop version
        run: python scripts/version_manager.py set-desktop "${{ needs.beta-metadata.outputs.version }}"
      - name: Build beta package
        working-directory: desktop
        run: npm run package:linux
      - name: Generate checksums
        shell: bash
        run: |
          sha256sum desktop/release/*.zip desktop/release/*.deb desktop/release/*.rpm > \
            desktop/release/SHA256SUMS-linux-x64.txt
      - name: Upload beta artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beta-desktop-linux-x64-${{ needs.beta-metadata.outputs.version }}
          path: |
            desktop/release/*.zip
            desktop/release/*.deb
            desktop/release/*.rpm
            desktop/release/SHA256SUMS-linux-x64.txt
          if-no-files-found: error

