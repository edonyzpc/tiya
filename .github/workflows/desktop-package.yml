        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Sync Python dependencies
        run: uv sync --group dev
      - name: Build arm64 macOS sidecars
        working-directory: desktop
        run: npm run build:sidecar
      - name: Archive arm64 macOS sidecars
        shell: bash
        run: |
          mkdir -p build/ci-artifacts
          tar -C dist -czf build/ci-artifacts/desktop-sidecars-macos-arm64.tar.gz desktop-sidecars
      - name: Upload arm64 macOS sidecars
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-sidecars-arm64
          path: build/ci-artifacts/desktop-sidecars-macos-arm64.tar.gz
          if-no-files-found: error

  release-macos-universal:
    name: Release Build macOS (universal)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - release-metadata
      - release-macos-sidecars-x64
      - release-macos-sidecars-arm64
    runs-on: macos-15
    env:
      TIYA_DESKTOP_TARGET_ARCH: universal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json
      - name: Sync Python dependencies
        run: uv sync --group dev
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --include=optional
      - name: Download x64 macOS sidecars
        uses: actions/download-artifact@v4
        with:
          name: release-macos-sidecars-x64
          path: build/macos-sidecars/x64
      - name: Download arm64 macOS sidecars
        uses: actions/download-artifact@v4
        with:
          name: release-macos-sidecars-arm64
          path: build/macos-sidecars/arm64
      - name: Restore macOS sidecar archives
        shell: bash
        run: |
          tar -C build/macos-sidecars/x64 -xzf build/macos-sidecars/x64/desktop-sidecars-macos-x64.tar.gz
          tar -C build/macos-sidecars/arm64 -xzf build/macos-sidecars/arm64/desktop-sidecars-macos-arm64.tar.gz
      - name: Prepare macOS universal sidecar bundle
        working-directory: desktop
        run: |
          node scripts/prepare-mac-universal-sidecars.mjs \
            --x64 ../build/macos-sidecars/x64/desktop-sidecars \
            --arm64 ../build/macos-sidecars/arm64/desktop-sidecars
      - name: Build universal release package
        working-directory: desktop
        run: npm run package:mac
      - name: Verify universal release app architecture
        shell: bash
        run: |
          set -euo pipefail
          app_path="desktop/release/mac-universal/tiya.app"
          executable_name="$("/usr/libexec/PlistBuddy" -c 'Print :CFBundleExecutable' "$app_path/Contents/Info.plist")"
          main_binary="$app_path/Contents/MacOS/$executable_name"
          framework_binary="$app_path/Contents/Frameworks/Electron Framework.framework/Versions/A/Electron Framework"

          lipo -verify_arch x86_64 arm64 "$main_binary"
          lipo -verify_arch x86_64 arm64 "$framework_binary"
      - name: Generate checksums
        shell: bash
        run: |
          shasum -a 256 desktop/release/*.zip desktop/release/*.dmg > \
            desktop/release/SHA256SUMS-macos-universal.txt
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-desktop-macos-universal-${{ needs.release-metadata.outputs.version }}
          path: |
            desktop/release/*.zip
            desktop/release/*.dmg
            desktop/release/SHA256SUMS-macos-universal.txt
          if-no-files-found: error

  publish-release:
    name: Publish Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - release-linux-x64
      - release-linux-arm64-rpm
      - release-macos-universal
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-desktop-*
          path: release-assets
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/**/*.zip
            release-assets/**/*.deb
            release-assets/**/*.rpm
            release-assets/**/*.dmg
            release-assets/**/SHA256SUMS-*.txt
