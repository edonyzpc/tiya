      - name: Build x64 macOS sidecars
        working-directory: desktop
        run: npm run build:sidecar
      - name: Archive x64 macOS sidecars
        shell: bash
        run: |
          mkdir -p build/ci-artifacts
          tar -C dist -czf build/ci-artifacts/desktop-sidecars-macos-x64.tar.gz desktop-sidecars
      - name: Upload x64 macOS sidecars
        uses: actions/upload-artifact@v4
        with:
          name: beta-macos-sidecars-x64
          path: build/ci-artifacts/desktop-sidecars-macos-x64.tar.gz
