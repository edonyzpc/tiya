name: Desktop Package

on:
  pull_request:
    branches:
      - master
    paths:
      - "desktop/**"
      - "packaging/**"
      - "scripts/**"
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/desktop-package.yml"
  push:
    branches:
      - master
    tags:
      - "v*"
    paths:
      - "desktop/**"
      - "packaging/**"
      - "scripts/**"
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/desktop-package.yml"

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json
      - name: Sync Python dependencies
        run: uv sync --group dev
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --include=optional
      - name: Run Python tests
        run: .venv/bin/python -m pytest
      - name: Typecheck desktop
        working-directory: desktop
        run: npm run typecheck

  smoke-linux-x64:
    name: Smoke Linux (x64)
    if: github.event_name == 'pull_request'
    needs: preflight
    runs-on: ubuntu-24.04
    env:
      TIYA_DESKTOP_TARGET_ARCH: x64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json
      - name: Sync Python dependencies
        run: uv sync --group dev
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --include=optional
      - name: Build smoke package
        working-directory: desktop
        run: npm run package:linux
      - name: Upload smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-smoke-linux-x64
          path: |
            desktop/release/*.deb
            desktop/release/*.rpm
            desktop/release/*.zip
            desktop/release/linux*-unpacked/**
          if-no-files-found: error

  smoke-linux-arm64-prep:
    name: Smoke Linux (arm64 prep)
    if: github.event_name == 'pull_request'
    needs: preflight
    runs-on: ubuntu-24.04-arm
    env:
      TIYA_DESKTOP_TARGET_ARCH: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json
      - name: Sync Python dependencies
        run: uv sync --group dev
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --include=optional
      - name: Build arm64 smoke package without RPM
        working-directory: desktop
        run: npm run package:linux-no-rpm
      - name: Archive arm64 unpacked app
        shell: bash
        run: tar -C desktop/release -czf desktop/release/linux-arm64-unpacked.tar.gz linux-arm64-unpacked
      - name: Upload arm64 repack input
        uses: actions/upload-artifact@v4
        with:
          name: desktop-smoke-linux-arm64-prepack
          path: |
            desktop/release/*.zip
            desktop/release/*.deb
            desktop/release/linux-arm64-unpacked.tar.gz
          if-no-files-found: error

  smoke-linux-arm64-rpm:
    name: Smoke Linux (arm64 rpm)
    if: github.event_name == 'pull_request'
    needs: smoke-linux-arm64-prep
    runs-on: ubuntu-24.04
    env:
      TIYA_DESKTOP_TARGET_ARCH: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --include=optional
      - name: Download arm64 repack input
        uses: actions/download-artifact@v4
        with:
          name: desktop-smoke-linux-arm64-prepack
          path: desktop/release
      - name: Restore arm64 unpacked app
        shell: bash
        run: tar -C desktop/release -xzf desktop/release/linux-arm64-unpacked.tar.gz
      - name: Build arm64 RPM from prepackaged app
        working-directory: desktop
        run: npm run package:rpm:prepackaged
      - name: Upload smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-smoke-linux-arm64
          path: |
            desktop/release/*.zip
            desktop/release/*.deb
            desktop/release/*.rpm
          if-no-files-found: error

  beta-metadata:
    name: Beta Metadata
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: preflight
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.beta_version.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compute beta desktop version
        id: beta_version
        run: |
          version="$(python scripts/version_manager.py beta-version --run-number "${{ github.run_number }}")"
          echo "value=$version" >> "$GITHUB_OUTPUT"

  beta-linux-x64:
    name: Beta Linux (x64)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs:
      - beta-metadata
    runs-on: ubuntu-24.04
    env:
      TIYA_DESKTOP_TARGET_ARCH: x64
    steps:
