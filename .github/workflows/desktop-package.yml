      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --include=optional
      - name: Apply beta desktop version
        run: python scripts/version_manager.py set-desktop "${{ needs.beta-metadata.outputs.version }}"
      - name: Build beta package without RPM
