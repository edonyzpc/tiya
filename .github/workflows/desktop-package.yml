      - name: Apply beta desktop version
        run: python scripts/version_manager.py set-desktop "${{ needs.beta-metadata.outputs.version }}"
      - name: Download x64 macOS sidecars
        uses: actions/download-artifact@v4
        with:
          name: beta-macos-sidecars-x64
          path: build/macos-sidecars/x64
      - name: Download arm64 macOS sidecars
        uses: actions/download-artifact@v4
        with:
          name: beta-macos-sidecars-arm64
          path: build/macos-sidecars/arm64
      - name: Restore macOS sidecar archives
        shell: bash
        run: |
          tar -C build/macos-sidecars/x64 -xzf build/macos-sidecars/x64/desktop-sidecars-macos-x64.tar.gz
          tar -C build/macos-sidecars/arm64 -xzf build/macos-sidecars/arm64/desktop-sidecars-macos-arm64.tar.gz
      - name: Prepare macOS universal sidecar bundle
        working-directory: desktop
        run: |
          node scripts/prepare-mac-universal-sidecars.mjs \
            --x64 ../build/macos-sidecars/x64/desktop-sidecars \
            --arm64 ../build/macos-sidecars/arm64/desktop-sidecars
      - name: Build universal beta package
        working-directory: desktop
        run: npm run package:mac
      - name: Verify universal beta app architecture
        shell: bash
        run: |
          set -euo pipefail
          app_path="desktop/release/mac-universal/tiya.app"
          executable_name="$("/usr/libexec/PlistBuddy" -c 'Print :CFBundleExecutable' "$app_path/Contents/Info.plist")"
          main_binary="$app_path/Contents/MacOS/$executable_name"
          framework_binary="$app_path/Contents/Frameworks/Electron Framework.framework/Versions/A/Electron Framework"

          lipo -verify_arch x86_64 arm64 "$main_binary"
          lipo -verify_arch x86_64 arm64 "$framework_binary"
      - name: Generate checksums
        shell: bash
        run: |
          shasum -a 256 desktop/release/*.zip desktop/release/*.dmg > \
            desktop/release/SHA256SUMS-macos-universal.txt
      - name: Upload beta artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beta-desktop-macos-universal-${{ needs.beta-metadata.outputs.version }}
          path: |
            desktop/release/*.zip
            desktop/release/*.dmg
            desktop/release/SHA256SUMS-macos-universal.txt
          if-no-files-found: error

  publish-beta:
    name: Publish Beta
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs:
      - beta-metadata
      - beta-linux-x64
      - beta-linux-arm64-rpm
      - beta-macos-universal
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download beta artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: beta-desktop-*-${{ needs.beta-metadata.outputs.version }}
          path: beta-assets
      - name: Publish GitHub beta release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-beta-${{ needs.beta-metadata.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: Desktop Beta ${{ needs.beta-metadata.outputs.version }}
          prerelease: true
          fail_on_unmatched_files: true
          overwrite_files: true
          body: |
            Automated beta desktop packages for `${{ needs.beta-metadata.outputs.version }}` built from `${{ github.sha }}`.

            These assets are intended for real installation testing before a stable `v*` release is tagged.
          files: |
            beta-assets/**/*.zip
            beta-assets/**/*.deb
            beta-assets/**/*.rpm
            beta-assets/**/*.dmg
            beta-assets/**/SHA256SUMS-*.txt

  release-metadata:
    name: Release Metadata
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: preflight
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release_version.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify release tag
        id: release_version
        run: |
          version="$(python scripts/version_manager.py verify-tag "${{ github.ref_name }}")"
          echo "value=$version" >> "$GITHUB_OUTPUT"
      - name: Verify release tag points to master HEAD
        shell: bash
        run: |
          master_sha="$(git rev-parse origin/master)"
          tag_sha="$(git rev-parse HEAD)"
          if [ "$tag_sha" != "$master_sha" ]; then
            echo "::error::Release tags must point to the latest commit on master."
            echo "::error::master=$master_sha tag=$tag_sha"
            exit 1
          fi

