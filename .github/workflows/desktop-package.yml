name: Desktop Package

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "desktop/**"
      - "packaging/**"
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/desktop-package.yml"
  push:
    branches:
      - main
    tags:
      - "desktop-v*"
    paths:
      - "desktop/**"
      - "packaging/**"
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/desktop-package.yml"

jobs:
  smoke:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/'))
    name: Smoke Linux (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    env:
      TIYA_DESKTOP_TARGET_ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json
      - name: Sync Python dependencies
        run: uv sync --group dev
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci
      - name: Run Python tests
        run: .venv/bin/python -m pytest
      - name: Typecheck desktop
        working-directory: desktop
        run: npm run typecheck
      - name: Build smoke package
        working-directory: desktop
        run: npm run package:linux
      - name: Upload smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-smoke-linux-${{ matrix.arch }}
          path: |
            desktop/release/*.deb
            desktop/release/*.rpm
            desktop/release/*.zip
            desktop/release/linux*-unpacked/**
          if-no-files-found: error

  release:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/desktop-v')
    name: Release ${{ matrix.platform }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux
            arch: x64
            package_script: package:linux
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            package_script: package:linux
          - runner: macos-15
            platform: macos
            arch: arm64
            package_script: package:mac
          - runner: macos-15-intel
            platform: macos
            arch: x64
            package_script: package:mac
    runs-on: ${{ matrix.runner }}
    env:
      TIYA_DESKTOP_TARGET_ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json
      - name: Sync Python dependencies
        run: uv sync --group dev
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci
      - name: Build desktop release
        working-directory: desktop
        run: npm run ${{ matrix.package_script }}
      - name: Generate Linux checksums
        if: matrix.platform == 'linux'
        shell: bash
        run: sha256sum desktop/release/*.zip desktop/release/*.deb desktop/release/*.rpm > desktop/release/SHA256SUMS.txt
      - name: Generate macOS checksums
        if: matrix.platform == 'macos'
        shell: bash
        run: shasum -a 256 desktop/release/*.zip desktop/release/*.dmg > desktop/release/SHA256SUMS.txt
      - name: Upload Linux preview artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-desktop-preview-${{ matrix.arch }}
          path: |
            desktop/release/*.zip
            desktop/release/*.deb
            desktop/release/*.rpm
            desktop/release/SHA256SUMS.txt
          if-no-files-found: error
      - name: Upload macOS preview artifacts
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-desktop-preview-${{ matrix.arch }}
          path: |
            desktop/release/*.zip
            desktop/release/*.dmg
            desktop/release/SHA256SUMS.txt
          if-no-files-found: error
