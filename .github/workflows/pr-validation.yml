name: PR Validation

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Sync Python dependencies
        run: uv sync --group dev
      - name: Run test suite
        run: .venv/bin/python -m pytest
